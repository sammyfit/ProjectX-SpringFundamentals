spring.application.name=prod-ready-features

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:postgresql://localhost:5432/hospitalDB
spring.datasource.username=postgres
spring.datasource.password=Sammy@9357

server.port=9000

employeeService.base.url=http://localhost:8080


logging.level.com.codingshuttle.prod_ready_features.clients=TRACE
logging.pattern.console=%d [%level] [%c{1.}] ---- %m%n
logging.file.name=apperror.log
logging.config=classpath:logbackspring.xml


management.endpoints.web.exposure.include=*
management.info.env.enabled=true
info.app.author=Samrat Ganguly
info.app.version=1.0.0
info.app.documentation=https://samratdocs.com/docs

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method